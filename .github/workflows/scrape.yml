name: Market Data Sync

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests brotli

      - name: Run Analytics Engine
        run: python update_prices.py

      - name: Commit and Push Data
        run: |
          git config --global user.name "MarketBot"
          git config --global user.email "bot@csrates.gg"
          git add prices.json
          git commit -m "Auto-sync: Skinport Cash Analytics" || exit 0
          git push
