<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSRates.gg | 2026 ROI Index</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f3ff; --bg: #020617; --panel: #0a1428; }
        body { background: var(--bg); color: #f1f5f9; font-family: 'Rajdhani', sans-serif; background-image: radial-gradient(circle at 50% 50%, #102a43 0%, #020617 100%); }
        .neon-text { font-family: 'Orbitron', sans-serif; text-shadow: 0 0 10px var(--neon); }
        .case-card { background: var(--panel); border: 1px solid rgba(0, 243, 255, 0.1); transition: 0.3s ease; cursor: pointer; }
        .case-card:hover { border-color: var(--neon); box-shadow: 0 0 20px rgba(0, 243, 255, 0.3); transform: translateY(-5px); }
        .rarity-gold { color: #e4ae39; text-shadow: 0 0 8px #e4ae39; }
        .rarity-red { color: #eb4b4b; }
    </style>
</head>
<body class="p-8">

    <header class="flex flex-col md:flex-row justify-between items-center mb-12 max-w-7xl mx-auto border-b border-cyan-900/40 pb-8">
        <div>
            <h1 class="text-5xl font-bold neon-text text-cyan-400 italic">CSRATES.GG</h1>
            <p id="syncStatus" class="text-[10px] tracking-widest text-cyan-800 mt-2 uppercase font-bold">Awaiting Playwright Sync...</p>
        </div>
        <div class="flex items-center gap-6 bg-slate-900/60 p-5 rounded border border-cyan-500/20">
            <span class="text-xs font-bold text-gray-500 uppercase">Include $2.49 Key</span>
            <input type="checkbox" id="keyToggle" onchange="renderGrid()" checked class="w-6 h-6 accent-cyan-400">
        </div>
    </header>

    <div id="case-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-6 max-w-7xl mx-auto"></div>

    <script>
        const KEY = 2.49;
        let containers = [
            { id: "dead_hand", name: "Dead Hand Terminal", price: 7.55, avg: 5.80, date: "2026-03-11", img: "crate_dead_hand" },
            { id: "gallery", name: "Gallery Case", price: 0.87, avg: 1.95, date: "2024-10-02", img: "crate_gallery" },
            { id: "kilowatt", name: "Kilowatt Case", price: 0.18, avg: 1.45, date: "2024-02-06", img: "crate_kilowatt" },
            { id: "bravo", name: "Operation Bravo", price: 55.00, avg: 28.50, date: "2013-09-19", img: "base_case_1" }
        ];

        async function init() {
            try {
                const res = await fetch('./prices.json');
                const live = await res.json();
                containers.forEach(c => {
                    if (live[c.id]) {
                        c.price = live[c.id].casePrice;
                        document.getElementById('syncStatus').innerText = `Live Sync Active: ${live[c.id].lastUpdated}`;
                        document.getElementById('syncStatus').classList.replace('text-cyan-800', 'text-green-500');
                    }
                });
            } catch (e) { console.log("Local JSON not found, using baseline data."); }
            renderGrid();
        }

        function renderGrid() {
            const grid = document.getElementById('case-grid');
            const useKey = document.getElementById('keyToggle').checked;
            grid.innerHTML = containers.map(c => {
                const cost = c.price + (useKey ? KEY : 0);
                const roi = ((c.avg / cost) * 100).toFixed(1);
                return `
                    <div class="case-card p-4 rounded flex flex-col items-center">
                        <span class="text-[9px] font-bold text-cyan-400 mb-4 border border-cyan-900 px-2 bg-black">${roi}% ROI</span>
                        <img src="https://raw.githubusercontent.com/BySaliZ/cs2-cdn/main/public/images/econ/weapon_cases/${c.img}.png" 
                             onerror="this.style.opacity='0.2'" class="w-32 h-24 object-contain">
                        <h3 class="text-[10px] font-bold text-white mt-4 text-center uppercase tracking-tighter">${c.name}</h3>
                    </div>
                `;
            }).join('');
        }

        init();
    </script>
</body>
</html>
