<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSRates.gg | Deep Market Analytics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f3ff; --bg: #020617; --panel: #0a1428; }
        body { background: var(--bg); color: #f1f5f9; font-family: 'Rajdhani', sans-serif; background-image: radial-gradient(circle at 50% 50%, #102a43 0%, #020617 100%); min-height: 100vh;}
        .neon-text { font-family: 'Orbitron', sans-serif; text-shadow: 0 0 10px var(--neon); }
        .case-card { background: var(--panel); border: 1px solid rgba(0, 243, 255, 0.1); transition: 0.2s ease; cursor: pointer; }
        .case-card:hover { border-color: var(--neon); box-shadow: 0 0 20px rgba(0, 243, 255, 0.3); transform: translateY(-4px); }
        #modal { display: none; position: fixed; inset: 0; background: rgba(2, 6, 23, 0.98); z-index: 100; align-items: center; justify-content: center; backdrop-filter: blur(15px); }
        .modal-content { background: var(--panel); border: 1px solid var(--neon); width: 95%; max-width: 600px; padding: 2.5rem; border-radius: 4px; }
        .rarity-gold { color: #e4ae39; font-weight: bold; }
        .rarity-red { color: #eb4b4b; font-weight: bold; }
        .rarity-pink { color: #d32ce6; font-weight: bold; }
        select { background: #0f172a; border: 1px solid #1e293b; color: var(--neon); padding: 6px 14px; font-family: 'Orbitron'; font-size: 10px; border-radius: 2px; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--neon); border-radius: 4px;}
    </style>
</head>
<body class="p-6 md:p-12">

    <header class="flex flex-col xl:flex-row justify-between items-center mb-16 max-w-[1600px] mx-auto border-b border-cyan-900/40 pb-8 gap-8">
        <div>
            <h1 class="text-5xl font-bold neon-text text-cyan-400 italic">CSRATES.GG</h1>
            <p id="syncStatus" class="text-[10px] tracking-[0.4em] text-cyan-800 mt-2 uppercase font-bold">Initializing Bulk Stream...</p>
        </div>
        
        <div class="flex flex-wrap items-center gap-6 bg-slate-900/60 p-6 rounded border border-cyan-500/20">
            <select id="sortSelect" onchange="renderGrid()">
                <option value="roiDesc">True ROI: High to Low</option>
                <option value="priceDesc">Container Cost: High to Low</option>
                <option value="alpha">Alphabetical</option>
            </select>
        </div>
    </header>

    <div id="case-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 xl:grid-cols-8 gap-4 max-w-[1600px] mx-auto"></div>

    <div id="modal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h2 id="modalTitle" class="text-3xl font-bold neon-text text-white mb-2 uppercase tracking-tighter"></h2>
            <div class="flex justify-between items-center mb-6">
                <p id="modalEv" class="text-xs text-green-400 font-mono uppercase tracking-widest"></p>
                <p id="modalCost" class="text-xs text-red-400 font-mono uppercase tracking-widest"></p>
            </div>
            
            <div class="mb-4 text-[10px] uppercase tracking-widest text-cyan-700 font-bold">Deep Yield Breakdown</div>
            <div id="lootList" class="space-y-3"></div>
            
            <button onclick="closeModal()" class="mt-10 w-full py-4 bg-cyan-500/10 border border-cyan-500 text-cyan-400 hover:bg-cyan-500 hover:text-black transition uppercase font-bold text-xs tracking-[0.3em]">Disconnect</button>
        </div>
    </div>

    <script>
        const imgBase = "https://raw.githubusercontent.com/ByMykel/CSGO-API/main/public/assets/img/containers/";
        let liveData = [];

        // Generates the correct image file name based on the container name
        function formatImageName(name) {
            return name.toLowerCase().replace(/ /g, '-').replace(/:/g, '').replace(/&/g, '') + ".png";
        }

        async function fetchMarketData() {
            try {
                const response = await fetch(`./prices.json?t=${new Date().getTime()}`);
                const jsonData = await response.json();
                
                liveData = Object.keys(jsonData).map(key => ({
                    id: key, 
                    img: formatImageName(jsonData[key].name),
                    ...jsonData[key] 
                }));
                
                document.getElementById('syncStatus').innerText = "BULK MARKET DATA SYNCED";
                document.getElementById('syncStatus').className = "text-[10px] tracking-[0.4em] text-green-500 mt-2 uppercase font-bold";
                renderGrid();
            } catch (error) { 
                console.error("Data ingestion failed.", error); 
                document.getElementById('syncStatus').innerText = "DATA PIPELINE OFFLINE";
                document.getElementById('syncStatus').className = "text-[10px] tracking-[0.4em] text-red-500 mt-2 uppercase font-bold";
            }
        }

        function renderGrid() {
            const grid = document.getElementById('case-grid');
            const sortVal = document.getElementById('sortSelect').value;

            if (sortVal === 'roiDesc') liveData.sort((a, b) => b.roi - a.roi);
            else if (sortVal === 'priceDesc') liveData.sort((a, b) => b.casePrice - a.casePrice);
            else liveData.sort((a, b) => a.name.localeCompare(b.name));

            grid.innerHTML = liveData.map(c => `
                <div class="case-card p-4 rounded flex flex-col items-center" onclick="openModal('${c.id}')">
                    <span class="text-[9px] font-bold ${c.roi >= 100 ? 'text-green-400' : 'text-cyan-400'} mb-4 border border-cyan-900 px-2 bg-black/80">${c.roi}% ROI</span>
                    <img src="${imgBase}${c.img}" onerror="this.src='https://via.placeholder.com/150x100/0a1428/00f3ff?text=Case'" class="w-32 h-24 object-contain">
                    <h3 class="text-[9px] font-bold text-white mt-4 text-center uppercase tracking-widest">${c.name}</h3>
                </div>
            `).join('');
        }

        function openModal(id) {
            const c = liveData.find(x => x.id === id);
            document.getElementById('modalTitle').innerText = c.name;
            document.getElementById('modalEv').innerText = `Total EV: $${c.totalEv.toFixed(2)}`;
            document.getElementById('modalCost').innerText = `Key+Case Cost: $${(c.casePrice + 2.49).toFixed(2)}`;
            
            document.getElementById('lootList').innerHTML = c.skins.map(s => `
                <div class="flex flex-col bg-white/5 p-4 border-l-2 border-cyan-900 hover:border-cyan-500 transition">
                    <div class="flex justify-between items-center mb-2">
                        <span class="text-xs font-bold rarity-${s.rarity} uppercase tracking-tighter">${s.base_name}</span>
                        <span class="text-[10px] text-cyan-400 font-mono">EV Added: $${s.weighted_ev.toFixed(2)}</span>
                    </div>
                    <div class="flex justify-between items-center border-t border-cyan-900/30 pt-2">
                        <span class="text-[8px] text-gray-500 uppercase">Max Pull: ${s.top_pull.replace('StatTrak™ ', 'ST ')}</span>
                        <span class="text-[10px] text-green-400 font-mono">$${s.top_pull_price.toFixed(2)}</span>
                    </div>
                </div>
            `).join('');
            
            document.getElementById('modal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; }
        fetchMarketData();
    </script>
</body>
</html>
